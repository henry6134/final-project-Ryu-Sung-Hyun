  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./coi-serviceworker.js').then(reg => {
        if (!crossOriginIsolated) location.reload();
      }).catch(err => {
        console.warn('ServiceWorker 등록 실패:', err);
      });
    }
  </script>
